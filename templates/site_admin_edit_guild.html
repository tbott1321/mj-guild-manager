<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Edit Guild</title><style>*{box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}body{margin:0;background:#f3f4f6}.topbar{background:linear-gradient(135deg,#111827,#1f2937,#312e81);color:white;padding:22px}.container{max-width:800px;margin:24px auto;padding:0 20px}.card{background:white;border-radius:18px;padding:22px}input{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;margin:8px 0 16px}button,a{padding:12px 16px;border-radius:12px;text-decoration:none;border:0;font-weight:700}button{background:#312e81;color:white}a{background:#eef2ff;color:#4338ca}</style></head><body><div class="topbar"><h1>Edit Guild {{ guild.guild_tag }}</h1></div><div class="container"><div class="card"><form method="post"><label>Email</label><input type="email" name="email" value="{{ guild.email }}"><label>New Guild Password</label><input type="password" name="guild_password" placeholder="Leave blank to keep current"><label>New Admin Password</label><input type="password" name="admin_password" placeholder="Leave blank to keep current"><button>Save</button> <a href="/site-admin">Back</a></form></div></div></body></html>
