<form method="GET" action="/" class="search-filter-form">
    
    <div class="search-row">
        <input 
            type="text"
            name="search"
            value="{{ search }}"
            placeholder="Search by name, rank, might, kills, or EDM"
            class="search-input"
        >

        <button type="submit" class="search-btn">
            Search
        </button>
    </div>

    <div class="filter-row">
        <select name="rank_filter">
            <option value="">All Ranks</option>
            <option value="RANK1" {% if rank_filter == "RANK1" %}selected{% endif %}>RANK1</option>
            <option value="RANK2" {% if rank_filter == "RANK2" %}selected{% endif %}>RANK2</option>
            <option value="RANK3" {% if rank_filter == "RANK3" %}selected{% endif %}>RANK3</option>
            <option value="RANK4" {% if rank_filter == "RANK4" %}selected{% endif %}>RANK4</option>
            <option value="RANK5" {% if rank_filter == "RANK5" %}selected{% endif %}>RANK5</option>
        </select>

        <select name="alt_filter">
            <option value="">All Accounts</option>
            <option value="yes" {% if alt_filter == "yes" %}selected{% endif %}>Alt Accounts</option>
            <option value="no" {% if alt_filter == "no" %}selected{% endif %}>Main Accounts</option>
        </select>

        <select name="troop_comp_filter">
            <option value="">All Troop Comps</option>
            <option value="Overweight" {% if troop_comp_filter == "Overweight" %}selected{% endif %}>Overweight</option>
            <option value="Pass" {% if troop_comp_filter == "Pass" %}selected{% endif %}>Pass</option>
            <option value="Low" {% if troop_comp_filter == "Low" %}selected{% endif %}>Low</option>
            <option value="N/A" {% if troop_comp_filter == "N/A" %}selected{% endif %}>N/A</option>
        </select>

        <input 
            type="number"
            name="min_mana"
            value="{{ min_mana }}"
            placeholder="Min Mana"
        >

        <input 
            type="number"
            name="min_sigils"
            value="{{ min_sigils }}"
            placeholder="Min Sigils"
        >

        <button type="submit" class="search-btn">
            Apply Filters
        </button>

        <a href="/" class="reset-btn">
            Reset
        </a>
    </div>
</form>
