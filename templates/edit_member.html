<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Member</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f3f4f6;
            color: #111827;
        }

        .topbar {
            background: linear-gradient(135deg, #111827, #1f2937, #312e81);
            color: white;
            padding: 22px 28px;
        }

        .topbar-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
        }

        .back {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 600;
        }

        .container {
            max-width: 1000px;
            margin: 24px auto;
            padding: 0 20px 24px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 24px rgba(15,23,42,.06);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 7px;
            font-weight: 600;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            background: white;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .full {
            grid-column: 1 / -1;
        }

        .checkbox-row {
            display: flex;
            gap: 10px;
            align-items: center;
            padding-top: 30px;
        }

        .checkbox-row input {
            width: auto;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 22px;
        }

        button,
        .button {
            border: none;
            text-decoration: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 700;
            cursor: pointer;
            display: inline-block;
        }

        .save {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            color: white;
        }

        .cancel {
            background: #e5e7eb;
            color: #111827;
        }

        .danger {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 760px) {
            .topbar-inner {
                flex-direction: column;
                align-items: flex-start;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
            }

            button,
            .button {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>

<div class="topbar">
    <div class="topbar-inner">
        <div class="title">Edit {{ member.name }}</div>
        <a class="back" href="/member/{{ member.igg_id }}">Back to Profile</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <form action="/member/{{ member.igg_id }}/edit" method="post">

            <div class="grid">
                <div>
                    <label>Name</label>
                    <input type="text" name="name" value="{{ member.name }}" required>
                </div>

                <div>
                    <label>Rank</label>
                    <select name="rank" required>
                        <option value="RANK1" {% if member.rank == "RANK1" %}selected{% endif %}>RANK1</option>
                        <option value="RANK2" {% if member.rank == "RANK2" %}selected{% endif %}>RANK2</option>
                        <option value="RANK3" {% if member.rank == "RANK3" %}selected{% endif %}>RANK3</option>
                        <option value="RANK4" {% if member.rank == "RANK4" %}selected{% endif %}>RANK4</option>
                        <option value="RANK5" {% if member.rank == "RANK5" %}selected{% endif %}>RANK5</option>
                    </select>
                </div>

                <div>
                    <label>Might</label>
                    <input type="number" name="might" value="{{ member.might or 0 }}" required>
                </div>

                <div>
                    <label>Kills</label>
                    <input type="number" name="kills" value="{{ member.kills or 0 }}" required>
                </div>

                <div>
                    <label>EDM</label>
                    <input type="number" name="edm" value="{{ member.edm or 0 }}" required>
                </div>

                <div>
                    <label>Kingdom Limit</label>
                    <input type="number" name="kingdom_limit" value="{{ member.kingdom_limit or 0 }}" min="0" step="1">
                </div>

                <div>
                    <label>Mana</label>
                    <select name="mana">
                        <option value="0" {% if member.mana == 0 %}selected{% endif %}>0</option>
                        <option value="1" {% if member.mana == 1 %}selected{% endif %}>1</option>
                        <option value="2" {% if member.mana == 2 %}selected{% endif %}>2</option>
                        <option value="3" {% if member.mana == 3 %}selected{% endif %}>3</option>
                        <option value="4" {% if member.mana == 4 %}selected{% endif %}>4</option>
                        <option value="5" {% if member.mana == 5 %}selected{% endif %}>5</option>
                        <option value="6" {% if member.mana == 6 %}selected{% endif %}>6</option>
                    </select>
                </div>

                <div>
                    <label>Sigils</label>
                    <input type="number" name="sigils" value="{{ member.sigils or 0 }}" min="0" step="1">
                </div>

                <div>
                    <label>Troop Comp</label>
                    <select name="troop_comp">
                        <option value="Overweight" {% if member.troop_comp == "Overweight" %}selected{% endif %}>Overweight</option>
                        <option value="Pass" {% if member.troop_comp == "Pass" %}selected{% endif %}>Pass</option>
                        <option value="Low" {% if member.troop_comp == "Low" %}selected{% endif %}>Low</option>
                        <option value="N/A" {% if member.troop_comp == "N/A" %}selected{% endif %}>N/A</option>
                    </select>
                </div>

                <div>
                    <label>Communication</label>
                    <select name="communication_method">
                        <option value="N/A" {% if member.communication_method == "N/A" %}selected{% endif %}>N/A</option>
                        <option value="WhatsApp" {% if member.communication_method == "WhatsApp" %}selected{% endif %}>WhatsApp</option>
                        <option value="Discord" {% if member.communication_method == "Discord" %}selected{% endif %}>Discord</option>
                        <option value="Both" {% if member.communication_method == "Both" %}selected{% endif %}>Both</option>
                    </select>
                </div>

                <div>
                    <label>WhatsApp Number</label>
                    <input type="text" name="whatsapp_number" value="{{ member.whatsapp_number or '' }}">
                </div>

                <div>
                    <label>Discord Username</label>
                    <input type="text" name="discord_username" value="{{ member.discord_username or '' }}">
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" name="alt_account" value="1" {% if member.alt_account %}checked{% endif %}>
                    <label style="margin: 0;">Alt Account</label>
                </div>

                <div class="full">
                    <label>Admin Comments</label>
                    <textarea name="comments">{{ member.comments or '' }}</textarea>
                </div>
            </div>

            <div class="actions">
                <button class="save" type="submit">Save Changes</button>
                <a class="button cancel" href="/member/{{ member.igg_id }}">Cancel</a>
                <a class="button danger" href="/member/{{ member.igg_id }}/delete">Delete Player</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
