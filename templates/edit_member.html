<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Guild Manager - Edit Member</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f3f4f6;
            color: #111827;
        }

        .topbar {
            background: linear-gradient(135deg, #111827, #1f2937, #312e81);
            color: white;
            padding: 22px 28px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .topbar-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: center;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
        }

        .back {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 600;
        }

        .container {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 20px 24px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #374151;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            background: white;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        .full {
            grid-column: 1 / -1;
        }

        .readonly {
            background: #f3f4f6;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .button, .link-button {
            display: inline-block;
            text-decoration: none;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .button {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            color: white;
        }

        .link-button {
            background: #eef2ff;
            color: #4338ca;
        }

        @media (max-width: 760px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .topbar-inner {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-inner">
            <div class="title">Edit Member</div>
            <a class="back" href="/member/{{ member.igg_id }}">Back to Profile</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <form action="/member/{{ member.igg_id }}/edit" method="post">
                <div class="grid">
                    <div>
                        <label>User ID</label>
                        <input class="readonly" value="{{ member.igg_id }}" readonly>
                    </div>

                    <div>
                        <label>Player Name</label>
                        <input name="name" value="{{ member.name }}" required>
                    </div>

                    <div>
                        <label>Rank</label>
                        <select name="rank" required>
                            <option value="RANK1" {% if (member.rank or '') == 'RANK1' %}selected{% endif %}>RANK1</option>
                            <option value="RANK2" {% if (member.rank or '') == 'RANK2' %}selected{% endif %}>RANK2</option>
                            <option value="RANK3" {% if (member.rank or '') == 'RANK3' %}selected{% endif %}>RANK3</option>
                            <option value="RANK4" {% if (member.rank or '') == 'RANK4' %}selected{% endif %}>RANK4</option>
                            <option value="RANK5" {% if (member.rank or '') == 'RANK5' %}selected{% endif %}>RANK5</option>
                        </select>
                    </div>

                    <div>
                        <label>Might</label>
                        <input type="number" name="might" value="{{ member.might or 0 }}" required>
                    </div>

                    <div>
                        <label>Kills</label>
                        <input type="number" name="kills" value="{{ member.kills or 0 }}" required>
                    </div>

                    <div>
                        <label>Enemy Destroyed Might</label>
                        <input type="number" name="edm" value="{{ member.edm or 0 }}" required>
                    </div>

                    <div>
                        <label>Mana</label>
                        <select name="mana" required>
                            <option value="0" {% if (member.mana or 0) == 0 %}selected{% endif %}>0</option>
                            <option value="1" {% if (member.mana or 0) == 1 %}selected{% endif %}>1</option>
                            <option value="2" {% if (member.mana or 0) == 2 %}selected{% endif %}>2</option>
                            <option value="3" {% if (member.mana or 0) == 3 %}selected{% endif %}>3</option>
                            <option value="4" {% if (member.mana or 0) == 4 %}selected{% endif %}>4</option>
                            <option value="5" {% if (member.mana or 0) == 5 %}selected{% endif %}>5</option>
                            <option value="6" {% if (member.mana or 0) == 6 %}selected{% endif %}>6</option>
                        </select>
                    </div>

                    <div>
                        <label>Sigils</label>
                        <input type="number" min="0" name="sigils" value="{{ member.sigils or 0 }}" required>
                    </div>

                    <div class="full">
                        <label>Comments</label>
                        <textarea name="comments">{{ member.comments or '' }}</textarea>
                    </div>
                </div>

                <div class="actions">
                    <button class="button" type="submit">Save Changes</button>
                    <a class="link-button" href="/member/{{ member.igg_id }}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
