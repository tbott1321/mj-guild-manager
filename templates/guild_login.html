<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Log in to Guild</title>
<style>*{box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#111827,#1f2937,#312e81);display:flex;align-items:center;justify-content:center;padding:24px}.card{width:100%;max-width:480px;background:white;border-radius:24px;padding:32px;box-shadow:0 24px 50px rgba(0,0,0,.22)}h1{margin:0 0 10px}p{color:#6b7280;line-height:1.6}label{display:block;font-size:14px;color:#374151;margin-bottom:8px;font-weight:700}input{width:100%;padding:14px;border-radius:12px;border:1px solid #d1d5db;margin-bottom:16px}button,.btn{text-decoration:none;border:none;border-radius:12px;padding:13px 18px;font-weight:800;cursor:pointer;display:inline-block}button{background:linear-gradient(135deg,#6366f1,#7c3aed);color:white}.btn{background:#eef2ff;color:#4338ca;margin-left:8px}.error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:12px;margin-bottom:16px}</style></head>
<body><div class="card"><h1>Log in to Guild</h1><p>Enter your case-sensitive 3 character guild tag and guild password.</p>{% if error %}<div class="error">{{ error }}</div>{% endif %}<form method="post" action="/guild/login"><label>Guild Tag</label><input name="guild_tag" maxlength="3" required><label>Guild Password</label><input type="password" name="guild_password" required><button type="submit">Enter Guild</button><a class="btn" href="/">Back</a></form></div></body></html>
