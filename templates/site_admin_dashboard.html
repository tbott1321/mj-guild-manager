<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Site Admin Dashboard</title><style>*{box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}body{margin:0;background:#f3f4f6;color:#111827}.topbar{background:linear-gradient(135deg,#111827,#1f2937,#312e81);color:white;padding:22px}.container{max-width:1200px;margin:24px auto;padding:0 20px}.card{background:white;border-radius:18px;padding:22px;box-shadow:0 10px 24px rgba(15,23,42,.06)}table{width:100%;border-collapse:collapse}th{background:#111827;color:white;text-align:left;padding:12px}td{padding:12px;border-bottom:1px solid #e5e7eb}.btn{display:inline-block;text-decoration:none;background:#eef2ff;color:#4338ca;padding:8px 12px;border-radius:10px;font-weight:700}.danger{background:#fee2e2;color:#991b1b}</style></head><body><div class="topbar"><h1>Site Admin Dashboard</h1><a class="btn" href="/site-admin/logout">Logout</a></div><div class="container"><div class="card"><h2>Guilds</h2><table><thead><tr><th>Guild</th><th>Email</th><th>Created</th><th>Members</th><th>Actions</th></tr></thead><tbody>{% for g in guilds %}<tr><td><strong>{{ g.guild_tag }}</strong></td><td>{{ g.email }}</td><td>{{ g.created_at }}</td><td>{{ g.member_count }}</td><td><a class="btn" href="/site-admin/guild/{{ g.id }}">Edit</a> <a class="btn" href="/site-admin/impersonate/{{ g.id }}">Open</a></td></tr>{% endfor %}</tbody></table></div></div></body></html>
