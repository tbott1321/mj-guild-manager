<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Permanently Delete Former Member</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; font-family: "Segoe UI", Arial, sans-serif; }
        body { margin: 0; background: #f3f4f6; color: #111827; }
        .topbar { background: linear-gradient(135deg, #111827, #1f2937, #312e81); color: white; padding: 22px 28px; }
        .topbar-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .title { font-size: 28px; font-weight: 700; }
        .back { text-decoration: none; color: white; background: rgba(255,255,255,0.12); padding: 10px 16px; border-radius: 12px; font-weight: 600; }
        .container { max-width: 900px; margin: 24px auto; padding: 0 20px 24px; }
        .card { background: white; border-radius: 18px; padding: 24px; box-shadow: 0 10px 24px rgba(15,23,42,.06); }
        .warning { background: #fee2e2; color: #991b1b; border-radius: 14px; padding: 16px; line-height: 1.7; margin-bottom: 20px; }
        .meta { background: #f8fafc; border-radius: 14px; padding: 16px; margin-bottom: 20px; line-height: 1.7; }
        label { display: block; font-size: 13px; color: #6b7280; font-weight: 600; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #d1d5db; margin-bottom: 16px; font-size: 14px; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; }
        button, .button { border: none; text-decoration: none; border-radius: 12px; padding: 12px 16px; font-weight: 700; cursor: pointer; display: inline-block; }
        .danger { background: #dc2626; color: white; }
        .cancel { background: #e5e7eb; color: #111827; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-inner">
        <div class="title">Delete Forever</div>
        <a class="back" href="/former-members">Cancel</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="warning">
            This permanently clears this player from the former member archive and removes their name history. This cannot be undone.
        </div>

        <div class="meta">
            <strong>Player:</strong> {{ former.name }}<br>
            <strong>Reason removed:</strong> {{ former.removal_reason }}<br>
            <strong>Removed at:</strong> {{ former.removed_at }}
        </div>

        <form action="/former-members/{{ former.id }}/delete" method="post">
            <label>Type the player name exactly to confirm:</label>
            <input name="confirm_text" required>

            <div class="actions">
                <button class="danger" type="submit">Delete Permanently</button>
                <a class="button cancel" href="/former-members">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
