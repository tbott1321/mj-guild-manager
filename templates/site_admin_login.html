<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Site Admin</title><style>*{box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#111827,#1f2937,#312e81);display:flex;align-items:center;justify-content:center;padding:24px}.card{width:100%;max-width:460px;background:white;border-radius:24px;padding:32px}input{width:100%;padding:14px;border:1px solid #d1d5db;border-radius:12px;margin:12px 0}button,a{padding:12px 16px;border-radius:12px;text-decoration:none;border:0;font-weight:700}button{background:#312e81;color:white}a{background:#eef2ff;color:#4338ca}.error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:12px}</style></head><body><div class="card"><h1>Site Admin</h1>{% if error %}<div class="error">{{ error }}</div>{% endif %}<form method="post"><label>Password</label><input type="password" name="password" required><button>Login</button> <a href="/">Back</a></form></div></body></html>
